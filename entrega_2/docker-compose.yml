version: '3.8'

services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory ${REDIS_MAXMEMORY:-200mb} --maxmemory-policy ${REDIS_POLICY:-allkeys-lru}

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  generador_respuestas:
    build: ./generador_respuestas
    container_name: generador_respuestas
    ports:
      - "8001:8001"
    volumes:
      - ./datos:/app/datos

  servicio_cache:
    build: ./servicio_cache
    container_name: servicio_cache
    ports:
      - "8002:8002"
    depends_on:
      - redis
      - generador_respuestas
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GENERADOR_URL=http://generador_respuestas:8001
      - TTL_SEGUNDOS=${TTL_SEGUNDOS:-60}

  almacenamiento_metricas:
    build: ./almacenamiento_metricas
    container_name: almacenamiento_metricas
    ports:
      - "8003:8003"

  generador_trafico:
    build: ./generador_trafico
    container_name: generador_trafico
    depends_on:
      - servicio_cache
      - almacenamiento_metricas
    environment:
      - CACHE_URL=http://servicio_cache:8002
      - METRICAS_URL=http://almacenamiento_metricas:8003
      - DISTRIBUCION=${DISTRIBUCION:-zipf}
      - TOTAL_CONSULTAS=${TOTAL_CONSULTAS:-1000}
      - INTERVALO_SEGUNDOS=${INTERVALO_SEGUNDOS:-0.1}

  productor_kafka:
    build: ./productor_kafka
    container_name: productor_kafka
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - TOPIC_CONSULTAS=consultas
      - DISTRIBUCION=${DISTRIBUCION:-zipf}
      - TOTAL_CONSULTAS=${TOTAL_CONSULTAS:-1000}
      - INTERVALO_SEGUNDOS=${INTERVALO_SEGUNDOS:-0.1}